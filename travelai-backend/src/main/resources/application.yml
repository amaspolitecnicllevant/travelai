spring:
  application:
    name: travelai-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/travelai}
    username: ${DB_USERNAME:travelai}
    password: ${DB_PASSWORD:travelai_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    encoding: UTF-8
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  session:
    store-type: redis
    timeout: 86400s
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      chat:
        model: ${OLLAMA_MODEL:qwen2.5:7b}
        options:
          temperature: 0.7
          num-ctx: 8192
          num-predict: 4096
          top-p: 0.9
      request-timeout: 120s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/event-stream
  error:
    include-message: always
  tomcat:
    threads:
      max: 200
      min-spare: 10

jwt:
  secret: ${JWT_SECRET:dev-secret-minimum-32-chars-change-in-prod!!}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket: ${MINIO_BUCKET:travelai}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  cors-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:80}
  contact-email: ${APP_CONTACT_EMAIL:privacidad@travelai.local}
  dpo-email: ${APP_DPO_EMAIL:dpo@travelai.local}
  ai:
    provider: ${AI_PROVIDER:ollama}
    max-retries: 3
    retry-delay-ms: 1500
  gdpr:
    deletion-days: ${GDPR_DELETION_DAYS:30}
    log-retention-days: ${GDPR_LOG_RETENTION_DAYS:365}
    min-age: ${GDPR_MIN_AGE:14}
    privacy-policy-version: "1.0"
    terms-version: "1.0"
  security:
    max-login-attempts: 5
    lockout-minutes: 15
    password-min-length: 8

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    com.travelai: DEBUG
    org.springframework.security: WARN
    org.springframework.ai: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
