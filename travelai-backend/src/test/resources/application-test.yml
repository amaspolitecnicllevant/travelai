spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: public
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  session:
    store-type: none
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen2.5:7b

jwt:
  secret: test-secret-minimum-32-chars-for-testing-only!
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: travelai

app:
  frontend-url: http://localhost:5173
  cors-origins: http://localhost:5173
  contact-email: test@travelai.local
  dpo-email: dpo@travelai.local
  gdpr:
    min-age: 14
    privacy-policy-version: "1.0"
    terms-version: "1.0"
    deletion-days: 30
    log-retention-days: 365
  security:
    max-login-attempts: 5
    lockout-minutes: 15
    password-min-length: 8
